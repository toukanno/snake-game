<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    color: #00ff00;
  }
  h1 { font-size: 2em; margin-bottom: 10px; text-shadow: 0 0 10px #00ff00; }
  #info { display: flex; gap: 40px; margin-bottom: 10px; font-size: 1.2em; }
  canvas {
    border: 2px solid #00ff00;
    box-shadow: 0 0 20px #00ff00;
  }
  #overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  #overlay h2 { font-size: 2.5em; text-shadow: 0 0 15px #00ff00; }
  #overlay p { font-size: 1.2em; }
  button {
    padding: 12px 30px;
    font-size: 1.1em;
    background: transparent;
    border: 2px solid #00ff00;
    color: #00ff00;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  button:hover { background: #00ff00; color: #000; }
  #controls { margin-top: 10px; font-size: 0.9em; color: #888; }
</style>
</head>
<body>
<h1>🐍 SNAKE GAME</h1>
<div id="info">
  <span>スコア: <span id="score">0</span></span>
  <span>ハイスコア: <span id="highscore">0</span></span>
  <span>レベル: <span id="level">1</span></span>
</div>
<div style="position:relative">
  <canvas id="canvas" width="500" height="500"></canvas>
  <div id="overlay">
    <h2 id="overlayTitle">SNAKE GAME</h2>
    <p id="overlayMsg">矢印キーまたはWASDで操作</p>
    <button id="startBtn" onclick="startGame()">スタート</button>
  </div>
</div>
<div id="controls">↑↓←→ または WASD で操作 | スペース: 一時停止</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const COLS = 20, ROWS = 20;
const CELL = canvas.width / COLS;

let snake, dir, nextDir, food, score, highscore, level, speed, gameLoop, running, paused;
let particles = [];

function initGame() {
  snake = [
    { x: 10, y: 10 },
    { x: 9, y: 10 },
    { x: 8, y: 10 }
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  level = 1;
  speed = 150;
  paused = false;
  placeFood();
  updateHUD();
}

function placeFood() {
  do {
    food = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS),
      type: Math.random() < 0.15 ? 'special' : 'normal'
    };
  } while (snake.some(s => s.x === food.x && s.y === food.y));
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  initGame();
  running = true;
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, speed);
}

function tick() {
  if (paused) return;
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return gameOver();
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return gameOver();
  }

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    const pts = food.type === 'special' ? 50 : 10;
    score += pts * level;
    highscore = Math.max(highscore, score);
    addParticles(food.x * CELL + CELL/2, food.y * CELL + CELL/2, food.type === 'special' ? '#ff0' : '#0f0');
    placeFood();
    // Level up every 100 points
    const newLevel = Math.floor(score / 100) + 1;
    if (newLevel > level) {
      level = newLevel;
      speed = Math.max(60, 150 - (level - 1) * 15);
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, speed);
    }
    updateHUD();
  } else {
    snake.pop();
  }
  draw();
}

function addParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 / 8) * i;
    particles.push({
      x, y,
      vx: Math.cos(angle) * (Math.random() * 3 + 1),
      vy: Math.sin(angle) * (Math.random() * 3 + 1),
      life: 30,
      color
    });
  }
}

function draw() {
  // Background grid
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < COLS; i++) {
    ctx.beginPath();
    ctx.moveTo(i * CELL, 0);
    ctx.lineTo(i * CELL, canvas.height);
    ctx.stroke();
  }
  for (let j = 0; j < ROWS; j++) {
    ctx.beginPath();
    ctx.moveTo(0, j * CELL);
    ctx.lineTo(canvas.width, j * CELL);
    ctx.stroke();
  }

  // Food
  const fx = food.x * CELL + CELL/2, fy = food.y * CELL + CELL/2;
  if (food.type === 'special') {
    ctx.shadowColor = '#ff0';
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#ff0';
    ctx.beginPath();
    ctx.arc(fx, fy, CELL/2 - 2, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#f80';
    ctx.font = `${CELL - 4}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('★', fx, fy);
  } else {
    ctx.shadowColor = '#f00';
    ctx.shadowBlur = 12;
    ctx.fillStyle = '#f00';
    ctx.beginPath();
    ctx.arc(fx, fy, CELL/2 - 4, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#f88';
    ctx.beginPath();
    ctx.arc(fx - 3, fy - 3, 3, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Snake
  snake.forEach((seg, i) => {
    const x = seg.x * CELL, y = seg.y * CELL;
    const green = Math.max(150, 255 - i * 5);
    ctx.fillStyle = i === 0 ? '#00ff88' : `rgb(0,${green},50)`;
    ctx.shadowColor = i === 0 ? '#00ff88' : 'transparent';
    ctx.shadowBlur = i === 0 ? 10 : 0;
    ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
    // Eyes on head
    if (i === 0) {
      ctx.fillStyle = '#000';
      ctx.shadowBlur = 0;
      const eyeSize = 3;
      const ex = dir.x === 0 ? x + CELL * 0.3 : (dir.x > 0 ? x + CELL * 0.7 : x + CELL * 0.2);
      const ey = dir.y === 0 ? y + CELL * 0.3 : (dir.y > 0 ? y + CELL * 0.7 : y + CELL * 0.2);
      ctx.fillRect(ex, ey, eyeSize, eyeSize);
      const ex2 = dir.x === 0 ? x + CELL * 0.7 : ex;
      const ey2 = dir.y === 0 ? y + CELL * 0.7 : ey;
      ctx.fillRect(ex2, ey2, eyeSize, eyeSize);
    }
  });
  ctx.shadowBlur = 0;

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    ctx.globalAlpha = p.life / 30;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
  });
  ctx.globalAlpha = 1;

  // Pause indicator
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#0f0';
    ctx.font = '48px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('PAUSE', canvas.width/2, canvas.height/2);
  }
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('highscore').textContent = highscore;
  document.getElementById('level').textContent = level;
}

function gameOver() {
  running = false;
  clearInterval(gameLoop);
  highscore = Math.max(highscore, score);
  updateHUD();
  document.getElementById('overlayTitle').textContent = 'GAME OVER';
  document.getElementById('overlayMsg').textContent = `スコア: ${score}`;
  document.getElementById('startBtn').textContent = 'リトライ';
  document.getElementById('overlay').style.display = 'flex';
}

document.addEventListener('keydown', e => {
  const moves = {
    ArrowUp: { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
    ArrowDown: { x: 0, y: 1 }, s: { x: 0, y: 1 }, S: { x: 0, y: 1 },
    ArrowLeft: { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
    ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 }, D: { x: 1, y: 0 }
  };
  if (moves[e.key] && running) {
    const m = moves[e.key];
    if (m.x !== -dir.x || m.y !== -dir.y) nextDir = m;
    e.preventDefault();
  }
  if (e.key === ' ' && running) { paused = !paused; e.preventDefault(); }
});

// Touch controls for mobile
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    const m = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
    if (m.x !== -dir.x) nextDir = m;
  } else {
    const m = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
    if (m.y !== -dir.y) nextDir = m;
  }
  e.preventDefault();
}, { passive: false });

// Draw initial screen
ctx.fillStyle = '#0a0a0a';
ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
